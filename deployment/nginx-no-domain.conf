# Nginx configuration for Skincare Analyzer Backend (NO DOMAIN VERSION)
# Akses via IP VPS langsung: http://YOUR_VPS_IP
# File ini akan ditempatkan di: /etc/nginx/sites-available/skincare-backend

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Upstream untuk FastAPI
upstream skincare_backend {
    server 127.0.0.1:8000 fail_timeout=30s max_fails=3;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;  # Accept any hostname (IP address)

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Max upload size untuk gambar OCR
    client_max_body_size 10M;
    client_body_timeout 60s;

    # Logging
    access_log /var/log/nginx/skincare-backend-access.log;
    error_log /var/log/nginx/skincare-backend-error.log warn;

    # Root location
    location / {
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        # Proxy settings
        proxy_pass http://skincare_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Timeouts
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Buffering
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Health check endpoint (bypass rate limit)
    location /health {
        proxy_pass http://skincare_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # Static files untuk uploads (jika ada)
    location /uploads/ {
        alias /home/skincare/skincare-analyzer-backend/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
